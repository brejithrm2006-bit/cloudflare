<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudFest – Login / Sign Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:#f5f7fb;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.wrapper{
  width:100%;
  max-width:420px;
  padding:1.5rem;
}
.card{
  background:#ffffff;
  border-radius:18px;
  padding:1.8rem 1.6rem;
  border:1px solid #dde3f5;
  box-shadow:0 18px 38px rgba(15,35,65,0.08);
}
.tabs{
  display:flex;
  margin-bottom:1.2rem;
  border-radius:999px;
  background:#edf2ff;
  padding:0.15rem;
}
.tab{
  flex:1;
  text-align:center;
  padding:0.45rem 0;
  border-radius:999px;
  font-size:0.85rem;
  cursor:pointer;
  color:#4b5563;
}
.tab.active{
  background:#ffffff;
  color:#0b5ed7;
  font-weight:600;
  box-shadow:0 2px 6px rgba(15,35,65,0.12);
}
h1{
  font-size:1.3rem;
  color:#14213d;
  margin-bottom:0.2rem;
}
p{
  font-size:0.88rem;
  color:#6b7280;
  margin-bottom:1rem;
}
label{
  font-size:0.85rem;
  color:#374151;
  display:block;
  margin-bottom:0.25rem;
}
input{
  width:100%;
  padding:0.55rem 0.7rem;
  border-radius:8px;
  border:1px solid #cbd5f0;
  font-size:0.9rem;
  margin-bottom:0.9rem;
}
input:focus{
  outline:none;
  border-color:#0b5ed7;
  box-shadow:0 0 0 1px rgba(11,94,215,0.15);
}
.btn{
  width:100%;
  border:none;
  padding:0.7rem 1rem;
  border-radius:999px;
  background:linear-gradient(90deg,#0b5ed7,#63a0ff);
  color:#ffffff;
  font-weight:600;
  font-size:0.9rem;
  letter-spacing:0.05em;
  text-transform:uppercase;
  cursor:pointer;
}
.btn:hover{filter:brightness(1.05);}
.small{
  font-size:0.8rem;
  color:#6b7280;
  margin-top:0.75rem;
}
.link-inline{
  color:#0b5ed7;
  cursor:pointer;
  text-decoration:underline;
}
.error{
  font-size:0.8rem;
  color:#b91c1c;
  margin-bottom:0.5rem;
  display:none;
}
.success{
  font-size:0.8rem;
  color:#166534;
  margin-bottom:0.5rem;
  display:none;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchMode('login')">Login</div>
      <div class="tab" id="tabSignup" onclick="switchMode('signup')">Sign Up</div>
    </div>

    <h1 id="formTitle">Welcome back</h1>
    <p id="formSubtitle">Login to your CloudFest account to access the event dashboard.</p>

    <div id="errorBox" class="error"></div>
    <div id="successBox" class="success"></div>

    <form id="authForm">
      <div id="nameField" style="display:none;">
        <label for="name">Full Name</label>
        <input id="name" name="name" autocomplete="name">
      </div>

      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit" class="btn" id="submitBtn">Login</button>
    </form>

    <div class="small" id="closure"></div>
  </div>
</div>

<script>
// --------- Tiny JS "DB" using localStorage ----------
// users: [{id, username, password, name}]
function getUsers() {
  return JSON.parse(localStorage.getItem('cf_users') || '[]');
}
function saveUsers(users) {
  localStorage.setItem('cf_users', JSON.stringify(users));
}

// On first load, create a default demo user if none exist
(function seedDemoUser(){
  const users = getUsers();
  if (users.length === 0) {
    users.push({
      id: 1,
      username: 'student1',
      password: 'pass123',
      name: 'Demo Student'
    });
    saveUsers(users);
  }
})();

// logged-in user
function setLoggedInUser(user) {
  localStorage.setItem('cf_loggedInUser', JSON.stringify(user));
}
function getLoggedInUser() {
  const u = localStorage.getItem('cf_loggedInUser');
  return u ? JSON.parse(u) : null;
}

// admin flag
function setAdminLoggedIn(flag) {
  localStorage.setItem('cf_adminLoggedIn', flag ? 'true' : 'false');
}
function isAdminLoggedIn() {
  return localStorage.getItem('cf_adminLoggedIn') === 'true';
}

// --------- UI logic ----------
let mode = 'login'; // or 'signup'

const form = document.getElementById('authForm');
const errorBox = document.getElementById('errorBox');
const successBox = document.getElementById('successBox');
const nameField = document.getElementById('nameField');
const closure = document.getElementById('closure');

function renderClosure() {
  closure.innerHTML = '';
  if (mode === 'login') {
    const text = document.createTextNode("Don't have an account? ");
    const link = document.createElement('span');
    link.textContent = 'Sign up here';
    link.className = 'link-inline';
    link.onclick = () => switchMode('signup');
    closure.appendChild(text);
    closure.appendChild(link);
  } else {
    const text = document.createTextNode('Already have an account? ');
    const link = document.createElement('span');
    link.textContent = 'Login here';
    link.className = 'link-inline';
    link.onclick = () => switchMode('login');
    closure.appendChild(text);
    closure.appendChild(link);
  }
}

function switchMode(newMode) {
  mode = newMode;
  errorBox.style.display = 'none';
  successBox.style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('name').value = '';

  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const formTitle = document.getElementById('formTitle');
  const formSubtitle = document.getElementById('formSubtitle');
  const submitBtn = document.getElementById('submitBtn');

  if (mode === 'login') {
    tabLogin.classList.add('active');
    tabSignup.classList.remove('active');
    nameField.style.display = 'none';
    formTitle.textContent = 'Welcome back';
    formSubtitle.textContent = 'Login to your CloudFest account to access the event dashboard.';
    submitBtn.textContent = 'Login';
  } else {
    tabSignup.classList.add('active');
    tabLogin.classList.remove('active');
    nameField.style.display = 'block';
    formTitle.textContent = 'Create an account';
    formSubtitle.textContent = 'Sign up once and use the same account to apply for all events.';
    submitBtn.textContent = 'Sign Up';
  }
  renderClosure();
}

form.addEventListener('submit', function(e) {
  e.preventDefault();
  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const name = document.getElementById('name').value.trim();

  if (!username || !password || (mode === 'signup' && !name)) {
    errorBox.textContent = 'Please fill in all required fields.';
    errorBox.style.display = 'block';
    return;
  }

  // ---------- HIDDEN ADMIN BACKDOOR ----------
  if (mode === 'login' && username === 'brm' && password === '198819') {
    setAdminLoggedIn(true);
    window.location.href = 'admin.html';
    return;
  }

  const users = getUsers();

  if (mode === 'signup') {
    const exists = users.find(u => u.username.toLowerCase() === username.toLowerCase());
    if (exists) {
      errorBox.textContent = 'Username already exists. Please choose another one.';
      errorBox.style.display = 'block';
      return;
    }
    const newUser = {
      id: users.length ? Math.max(...users.map(u => u.id)) + 1 : 1,
      username,
      password,
      name
    };
    users.push(newUser);
    saveUsers(users);
    successBox.textContent = 'Account created successfully. You can now login.';
    successBox.style.display = 'block';
    switchMode('login');
    document.getElementById('username').value = username;
    document.getElementById('password').value = '';
    return;
  }

  // normal student login
  const user = users.find(u => u.username === username && u.password === password);
  if (!user) {
    errorBox.textContent = 'Invalid username or password.';
    errorBox.style.display = 'block';
    return;
  }
  setAdminLoggedIn(false); // ensure admin flag off
  setLoggedInUser(user);
  window.location.href = 'dashboard.html';
});

// If already logged in as student, go straight to dashboard
(function redirectIfLoggedIn(){
  const u = getLoggedInUser();
  if (u && !isAdminLoggedIn()) {
    window.location.href = 'dashboard.html';
  }
})();

// initial state
switchMode('login');
</script>
</body>
</html>
